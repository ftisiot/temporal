# Dynamic configuration for Temporal development environment with SQL backend
# Reference: https://docs.temporal.io/references/dynamic-configuration

system.forceSearchAttributesCacheRefreshOnRead:
  - value: true
    constraints: {}

# Limit concurrent workflow task pollers
limit.maxIDLength:
  - value: 255
    constraints: {}

# History service settings
history.persistenceMaxQPS:
  - value: 3000
    constraints: {}

history.persistenceGlobalMaxQPS:
  - value: 0
    constraints: {}

# Matching service settings
matching.numTaskqueueReadPartitions:
  - value: 5
    constraints: {}

matching.numTaskqueueWritePartitions:
  - value: 5
    constraints: {}

# Frontend service settings
frontend.persistenceMaxQPS:
  - value: 3000
    constraints: {}

frontend.persistenceGlobalMaxQPS:
  - value: 0
    constraints: {}

frontend.historyMgrNumConns:
  - value: 10
    constraints: {}

# Worker settings
worker.enableScheduler:
  - value: true
    constraints: {}

worker.enableBatcher:
  - value: true
    constraints: {}
