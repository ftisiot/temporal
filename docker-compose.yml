x-postgres-config: &postgres-config
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-postgres}

services:
  postgresql-temporal:
    image: postgres:16-alpine
    environment:
      <<: *postgres-config
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    build:
      context: ./containers/temporal-server
      dockerfile: Containerfile
    depends_on:
      postgresql-temporal:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql-temporal
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-postgres}
      - DBNAME=${POSTGRES_DB:-postgres}
      - VISIBILITY_DBNAME=${POSTGRES_DB:-postgres}_visibility
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - SKIP_DB_CREATE=false
      - SKIP_SCHEMA_SETUP=false
    ports:
      - "7233:7233"
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    build:
      context: ./containers/temporal-ui
      dockerfile: Containerfile
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  postgresql-data:
