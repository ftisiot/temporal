x-postgres-config: &postgres-config
  POSTGRES_USER: ${POSTGRES_USER:-temporal}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal}
  POSTGRES_DB: ${POSTGRES_DB:-temporal}

services:
  postgresql-temporal:
    image: postgres:16-alpine
    container_name: postgresql-temporal
    environment:
      <<: *postgres-config
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    build:
      context: ./containers/temporal-server
      dockerfile: Containerfile
    container_name: temporal-server
    depends_on:
      postgresql-temporal:
        condition: service_healthy
    environment:
      DB: postgres12
      DATABASE_URL: postgresql://${POSTGRES_USER:-temporal}:${POSTGRES_PASSWORD:-temporal}@postgresql-temporal:5432/${POSTGRES_DB:-temporal}
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - temporal-network

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge

volumes:
  postgresql-data:
