x-postgres-config: &postgres-config
  POSTGRES_USER: temporal
  POSTGRES_PASSWORD: temporal
  POSTGRES_DB: temporal

services:
  postgresql-temporal:
    build:
      context: ./containers/postgresql-temporal
      dockerfile: Containerfile
    container_name: postgresql-temporal
    environment:
      <<: *postgres-config
    expose:
      - "5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    build:
      context: ./containers/temporal-server
      dockerfile: Containerfile
    container_name: temporal-server
    depends_on:
      postgresql-temporal:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgresql-temporal
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    expose:
      - "7233"
    ports:
      - "7233:7233"
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-admin-tools:
    build:
      context: ./containers/temporal-admin-tools
      dockerfile: Containerfile
    container_name: temporal-admin-tools
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    tty: true

  temporal-ui:
    build:
      context: ./containers/temporal-ui
      dockerfile: Containerfile
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge

volumes:
  postgresql-data:
