services:
  postgresql:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PWD:-postgres}
      - POSTGRES_DB=${DBNAME:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    build:
      context: ./containers/temporal-server
      dockerfile: Containerfile
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_SEEDS=${POSTGRES_SEEDS:-postgresql}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PWD=${POSTGRES_PWD:-postgres}
      - DBNAME=${DBNAME:-postgres}
      - VISIBILITY_DBNAME=${VISIBILITY_DBNAME:-postgres_visibility}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - SKIP_DB_CREATE=false
      - SKIP_SCHEMA_SETUP=false
    ports:
      - "7233:7233"
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    build:
      context: ./containers/temporal-ui
      dockerfile: Containerfile
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  postgresql-data:
